<!DOCTYPE html>
<html>
<head>
  <title>YBN Result</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">
  <div class="card">

    <img src="logo.png" class="logo">

    <h2>YBN UNIVERSITY</h2>
    <h3>Search Result</h3>

    <!-- YEAR -->
    <label>Examination Year</label>
    <select id="year">
      <option>Select Year</option>
       <option>2019</option>
       <option>2020</option>
       <option>2021</option>
       <option>2022</option>
       <option>2023</option>
       <option>2024</option>
       <option>2025</option>
    </select>

    <!-- MONTH -->
    <label>Examination Month</label>
    <select id="month">
      <option>Select Month</option>
      <option>Jan</option>
      <option>Feb</option>
      <option>Mar</option>
      <option>Apr</option>
      <option>May</option>
      <option>Jun</option>
      <option>Jul</option>
      <option>Aug</option>
      <option>Sep</option>
      <option>Oct</option>
      <option>Nov</option>
      <option>Dec</option>
    </select>

    <!-- COURSE -->
    <label>Select Course</label>
    <select id="course">
      <option>Select Course</option>
      <option>B.Sc</option>
      <option>B.Com</option>
      <option>B.A</option>
      <option>BBA</option>
      <option>BCA</option>
      <option>B.Tech</option>
      <option>M.Sc</option>
      <option>M.Com</option>
      <option>M.A</option>
      <option>MBA</option>
      <option>MCA</option>
      <option>M.Tech</option>
    </select>

    <!-- SEMESTER -->
    <label>Semester</label>
    <select id="sem">
      <option>Select Semester</option>
      <option>1</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5</option>
      <option>6</option>
      <option>7</option>
      <option>8</option>
    </select>

    <!-- ROLL -->
    <label>Roll No.</label>
    <input id="roll" placeholder="Enter Roll Number">

    <button onclick="getResult()">Submit</button>

    <div id="result"></div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
